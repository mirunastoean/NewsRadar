<div class="manage-sources-container">
  <div class="header-actions">
    <h2>Gestionează Sursele de Știri</h2>
    <button mat-stroked-button color="primary" class="add-btn" (click)="openAddSourceDialog()">
      Adaugă Sursă Nouă
    </button>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Nume Sursă </th>
      <td mat-cell *matCellDef="let element"> <strong>{{element.name}}</strong> </td>
    </ng-container>

    <ng-container matColumnDef="url">
      <th mat-header-cell *matHeaderCellDef> Link RSS </th>
      <td mat-cell *matCellDef="let element" class="text-muted"> {{element.url}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Acțiuni </th>
      <td mat-cell *matCellDef="let element"> 
        <button mat-button color="primary" (click)="deleteSource(element)">Șterge</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
