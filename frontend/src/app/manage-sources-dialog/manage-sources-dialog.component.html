<div class="page-container">
  <div class="header-actions">
    <h2>Gestionează Sursele de Știri</h2>
    <button mat-raised-button color="primary">Adaugă Sursă Nouă</button>
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="sources" style="width: 100%;">
      
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Nume Sursă </th>
        <td mat-cell *matCellDef="let element"> <strong>{{element.name}}</strong> </td>
      </ng-container>

      <ng-container matColumnDef="url">
        <th mat-header-cell *matHeaderCellDef> Link RSS </th>
        <td mat-cell *matCellDef="let element" style="color: gray;"> {{element.url}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Acțiuni </th>
        <td mat-cell *matCellDef="let element">
          <button mat-button color="warn">Șterge</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
