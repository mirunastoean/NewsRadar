<div class="search-section">
  <mat-card class="search-card">
    <mat-form-field appearance="fill" class="search-field">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput type="text" placeholder="Caută titluri, surse, etc..." [(ngModel)]="searchTerm" (keyup)="applyFilter()">
      <button *ngIf="searchTerm" matSuffix mat-icon-button aria-label="Clear" (click)="searchTerm=''; applyFilter()">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>
  </mat-card>
</div>

<div class="articles-container">
  @for (article of filteredArticles; track article.id) {
    <mat-card class="article-card">
      <mat-card-header>
        <mat-card-title>{{ article.title }}</mat-card-title>
        <mat-card-subtitle>{{ article.source }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>{{ article.content ? (article.content | slice:0:150) + '...' : 'Fără descriere disponibilă.' }}</p>
      </mat-card-content>
      <mat-card-actions>
        <a mat-button color="accent" [href]="article.url" target="_blank">Citește articolul</a>
      </mat-card-actions>
    </mat-card>
  } @empty {
    <div style="padding: 20px; text-align: center; width: 100%;">
      <p>Nu am găsit nicio știre care să se potrivească.</p>
    </div>
  }
</div>
